<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programmer Calculator</title>
    <link rel="icon" href="icons8-calculator-48.png" type="image/x-icon" />

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            overflow-x: hidden;
        }

        /* ✅ Hidden by default */
        .container-display {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }

        .display-container,
        .buttons-container {
            padding: clamp(20px, 4vw, 40px);
            border-radius: 30px;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0, 0, 0, .7);
            border: 1px solid rgba(255, 255, 255, .1);
        }

        #main-expression {
            text-align: right;
            font-size: clamp(28px, 6vw, 70px);
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
            min-height: 60px;
            font-family: 'JetBrains Mono', monospace;
            word-break: break-all;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: clamp(35px, 8vw, 70px);
            font-size: clamp(16px, 3vw, 22px);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }

        .op { background: #FFB6C1; color: white; }
        .equal { background: #ff782e; color: white; }
        .clear { background: #ff4d4d; color: white; }
        .play { background: #b84dff; color: white; }
        .backspace { background: #6b6eff; color: white; }
        .darkmode { background: #414141; color: #fff; }

    </style>
</head>

<body>

    <div class="container-display">
        <div class="display-container">
            <div id="main-expression">0</div>

            <div class="modes-container">
                <div class="modes">
                    <span id="lbl-hex">HEX</span>
                </div>
                <div class="values">
                    <div id="val-hex">0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="buttons-container">
            <h1 style="text-align:center;">Base Converter</h1>

            <div class="buttons">
                <button class="clear">Clear</button>
                <button class="backspace">⌫</button>
                <button id="playPause" class="play">♬</button>
                <button class="darkmode">⚪</button>

                <button>D</button>
                <button>E</button>
                <button>F</button>
                <button class="equal">=</button>

                <button>A</button>
                <button>B</button>
                <button>C</button>
                <button class="op">+</button>

                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="op">−</button>

                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>0</button>

                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>👁</button>

                <!-- ✅ Updated Display Button -->
                <button id="toggleDisplay">Display</button>
            </div>
        </div>
    </div>

<script>
const display = document.getElementById("main-expression");
const valHex = document.getElementById("val-hex");
const toggleDisplayBtn = document.getElementById("toggleDisplay");
const displayContainer = document.querySelector(".container-display");

let expression = "0";
const OPERATORS = ["+", "−"];

/* ✅ Toggle Logic */
toggleDisplayBtn.addEventListener("click", () => {
    if (displayContainer.style.display === "none" || displayContainer.style.display === "") {
        displayContainer.style.display = "grid";
    } else {
        displayContainer.style.display = "none";
    }
});

/* ✅ Prevent Display button from calculator input */
document.querySelectorAll(".buttons button").forEach(button => {
    if (
        button.id === "playPause" ||
        button.classList.contains("darkmode") ||
        button.id === "toggleDisplay"
    ) return;

    button.addEventListener("click", () => {
        handleInput(button.textContent.trim());
    });
});

function handleInput(value) {

    if (value === "Clear") {
        expression = "0";
    }

    else if (value === "⌫") {
        expression = expression.length > 1 ? expression.slice(0, -1) : "0";
    }

    else if (value === "=") {
        calculateResult();
        return;
    }

    else {
        expression = expression === "0" ? value : expression + value;
    }

    updateDisplay();
}

function updateDisplay() {
    display.textContent = expression;

    if (/^[0-9A-Fa-f]+$/.test(expression)) {
        const decimalValue = parseInt(expression, 16);
        valHex.textContent = decimalValue.toString(16).toUpperCase();
    }
}

function calculateResult() {
    try {
        let safeExpression = expression.replace(/−/g, "-");
        safeExpression = safeExpression.replace(/[0-9A-F]+/gi, match => parseInt(match, 16));
        const result = Function('"use strict"; return (' + safeExpression + ')')();
        expression = Math.floor(result).toString(16).toUpperCase();
        updateDisplay();
    } catch {
        expression = "Error";
        display.textContent = "Error";
    }
}
</script>

</body>
</html>
