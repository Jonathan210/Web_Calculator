<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Programmer Tools - Home</title>

    <link rel="icon" href="icons8-calculator-48.png">

    <link
        href="https://fonts.googleapis.com/css2?family=Bungee&family=Caveat:wght@400..700&family=Cherry+Bomb+One&family=DynaPuff:wght@400..700&family=Fauna+One&family=Lobster&family=Schoolbell&family=Science+Gothic:wght@100..900&display=swap"
        rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            overflow: hidden;
        }

        #bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.6);
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1100px;
            width: 100%;
        }

        @media (max-width:900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0, 0, 0, .7);
            border: 1px solid rgba(255, 255, 255, .1);
        }

        h1 {
            font-size: clamp(28px, 6vw, 50px);
            text-align: center;
            color: white;
            font-family: "Schoolbell", cursive;
            letter-spacing: 3px;
        }

        .subtitle {
            text-align: center;
            color: white;
            letter-spacing: 8px;
            font-family: "Schoolbell", cursive;
            margin-bottom: 30px;
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        button {
            height: 65px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
        }

        button:hover {
            transform: translateY(-3px);
            background: #a8ffa8;
        }

        .start {
            background: #ff782e;
            color: white;
        }

        .calc {
            background: #ffe75c;
        }

        .truth {
            background: #ffb6c1;
        }

        .about {
            background: #6b6eff;
            color: white;
        }

        .settings {
            background: #b84dff;
            color: white;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .control-btn {
            width: 120px;
            background: #858585;
            color: black;
        }

        .control-btn:hover {
            background: black;
            color: white;
        }

        .info {
            text-align: center;
            color: white;
            font-size: 22px;
            font-family: 'JetBrains Mono', monospace;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: white;
            letter-spacing: 5px;
            font-family: "Schoolbell", cursive;
        }

        /* LIGHT MODE */

        body.light-mode {
            background: white;
        }

        body.light-mode .panel {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        body.light-mode h1,
        body.light-mode .subtitle,
        body.light-mode .footer {
            color: black;
        }

        body.light-mode .info {
            color: black;
        }
    </style>
</head>

<body>

    <audio id="bgMusic" src="Assets/Gustixa - lemon tree.mp3" loop></audio>

    <video autoplay muted loop id="bg-video">
        <source src="Assets/darkmode.mp4" type="video/mp4">
    </video>

    <div class="container">

        <!-- LEFT PANEL -->

        <div class="panel">

            <p class="subtitle">Calculators</p>

            <div class="menu">

                <button class="start" onclick="enterApp()">Start</button>

                <button class="calc" onclick="openCalc()">Hexadecimal</button>

                <button class="truth" onclick="openTruth()">Truth Table</button>

                <button class="settings" onclick="openSettings()">Set Operation</button>


            </div>

            <div class="controls">

                <button id="musicBtn" class="control-btn">♬</button>

                <button id="themeBtn" class="control-btn">Light</button>

            </div>

        </div>

        <!-- RIGHT PANEL -->
        <div class="panel">
            <div class="footer">
                Lim and Audrey
            </div>
            <p class="info">Welcome to Programmer Tools! This is a collection of useful tools for programmers. You can
                use the calculator to perform basic arithmetic operations, the truth table generator to create truth
                tables for logical expressions, and more. Enjoy!</p>
        </div>
    </div>

    <script>

        const bgMusic = document.getElementById("bgMusic");
        const musicBtn = document.getElementById("musicBtn");
        const themeBtn = document.getElementById("themeBtn");

        /* MUSIC */

        musicBtn.onclick = () => {
            if (bgMusic.paused) {
                bgMusic.play();
                musicBtn.textContent = "⏸ Pause";
            }
            else {
                bgMusic.pause();
                musicBtn.textContent = "♬ Music";
            }
        };

        /* THEME */

        function applyTheme(theme) {

            if (theme === "light") {
                document.body.classList.add("light-mode");
                themeBtn.textContent = "Dark";
            }
            else {
                document.body.classList.remove("light-mode");
                themeBtn.textContent = "Light";
            }

            localStorage.setItem("theme", theme);
        }

        const savedTheme = localStorage.getItem("theme") || "dark";
        applyTheme(savedTheme);

        themeBtn.onclick = () => {
            const newTheme = document.body.classList.contains("light-mode") ? "dark" : "light";
            applyTheme(newTheme);
        };

        /* NAVIGATION */

        function enterApp() {
            alert("Entering Application...");
        }

        function openCalc() {
            alert("Open Hex Calculator Page");
        }

        function openTruth() {
            alert("Open Truth Table Page");
        }

        function openAbout() {
            alert("About Page");
        }

        function openSettings() {
            alert("Settings Page");
        }
        function openCalc() {
            window.location.href = "Hexdecimal_Calc.html";
        }

        function openTruth() {
            window.location.href = "Truth_Table_Calc.html";
        }

        function openAbout() {
            window.location.href = "about.html";
        }

        function openSettings() {
            window.location.href = "Set_Operation_Calc.html";
        }
    </script>

</body>

</html>
