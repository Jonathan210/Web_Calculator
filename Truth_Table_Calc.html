<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Truth Table Calculator</title>

<link rel="icon" href="icons8-calculator-48.png">

<link href="https://fonts.googleapis.com/css2?family=Schoolbell&family=Science+Gothic:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:"Science Gothic",sans-serif;
}

body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:#1a1a1a;
overflow:hidden;
}

#bg-video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
filter:brightness(.6);
}

.panel{
width:700px;
padding:40px;
border-radius:30px;
backdrop-filter:blur(12px);
background:rgba(255,255,255,.05);
box-shadow:0 30px 60px rgba(0,0,0,.7);
border:1px solid rgba(255,255,255,.1);
text-align:center;
color:white;
}

h1{
font-family:"Schoolbell",cursive;
letter-spacing:3px;
}

input{
width:80%;
padding:10px;
margin:10px;
font-size:16px;
border-radius:8px;
border:none;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
background:#ffb6c1;
}

button:hover{
background:#a8ffa8;
transform:translateY(-2px);
}

table{
margin-top:20px;
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid white;
padding:8px;
}

.footer{
margin-top:20px;
font-family:"Schoolbell";
letter-spacing:4px;
}

body.light-mode{
background:white;
}

body.light-mode .panel{
background:rgba(255,255,255,.3);
color:black;
}

body.light-mode table, 
body.light-mode th,
body.light-mode td{
border:1px solid black;
}

</style>
</head>

<body>

<audio id="bgMusic" src="Assets/Gustixa - lemon tree.mp3" loop></audio>

<video autoplay muted loop id="bg-video">
<source src="Assets/darkmode.mp4" type="video/mp4">
</video>

<div class="panel">

<h1>Truth Table Generator</h1>

<input id="expression" placeholder="Example: A && B">

<br>

<button onclick="generateTable()">Generate Truth Table</button>
<button onclick="toggleTheme()">Toggle Theme</button>

<table id="table"></table>

<div class="footer">Programmer Tools</div>

</div>

<script>

function generateTable(){

let exp=document.getElementById("expression").value;

let table=document.getElementById("table");

table.innerHTML="";

let header="<tr><th>A</th><th>B</th><th>Result</th></tr>";
table.innerHTML+=header;

let values=[true,false];

values.forEach(A=>{
values.forEach(B=>{

let result;

try{
result=eval(exp);
}catch{
result="Error";
}

table.innerHTML+=`<tr>
<td>${A}</td>
<td>${B}</td>
<td>${result}</td>
</tr>`;

});
});

}

function toggleTheme(){
document.body.classList.toggle("light-mode");
}

</script>

</body>
</html>
